name: build-main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    if: ${{ github.actor == 'swarm-agent' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Derive release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="$(git describe --tags --exact-match 2>/dev/null || true)"
          if [[ -n "${tag}" ]]; then
            version="${tag}"
            prerelease=false
          else
            short_sha="$(git rev-parse --short HEAD)"
            version="0.0.0-dev+${short_sha}"
            prerelease=true
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Build release bundle
        run: ./scripts/build-main-dist.sh --output-dir dist --version "${{ steps.version.outputs.version }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: main-build-${{ steps.version.outputs.version }}
          path: |
            dist/linux-amd64
            dist/web
            dist/build-info.txt
            dist/swarm-${{ steps.version.outputs.version }}-linux-amd64.tar.gz
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/swarm-${{ steps.version.outputs.version }}-linux-amd64.tar.gz
            dist/build-info.txt
