name: build-main

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: build-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    if: ${{ github.actor == 'swarm-agent' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Resolve build version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            short_sha="${GITHUB_SHA::12}"
            version="pr-${{ github.event.pull_request.number }}-${short_sha}"
            prerelease="true"
          else
            version="$(./scripts/resolve-release-version.sh)"
            prerelease="false"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Create release tag when missing
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          if git describe --tags --exact-match >/dev/null 2>&1; then
            echo "exact tag already present on HEAD"
            exit 0
          fi
          version="${{ steps.version.outputs.version }}"
          if git rev-parse "${version}" >/dev/null 2>&1; then
            echo "release tag already exists: ${version}" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${version}" -m "Release ${version}"
          git push origin "refs/tags/${version}"

      - name: Build release bundle
        run: ./scripts/build-main-dist.sh --output-dir dist --version "${{ steps.version.outputs.version }}"

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and inspect container image artifact
        shell: bash
        run: |
          set -euo pipefail
          image_ref="localhost/swarm:${{ steps.version.outputs.version }}"
          base_ref="localhost/swarm-base:ubuntu24.04-tailscale-stable-v1"
          push_args=()
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            image_ref="ghcr.io/${{ github.repository_owner }}/swarm:${{ steps.version.outputs.version }}"
            base_ref="ghcr.io/${{ github.repository_owner }}/swarm-base:ubuntu24.04-tailscale-stable-v1"
            push_args+=(--push)
          fi
          ./scripts/build-container-artifact.sh \
            --dist-dir dist \
            --output-dir dist/container \
            --runtime docker \
            --base-image-name "${base_ref}" \
            --image-name "${image_ref}" \
            --source-repository "https://github.com/${{ github.repository }}" \
            --source-revision "${{ github.sha }}" \
            --github-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "${push_args[@]}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: main-build-${{ steps.version.outputs.version }}
          path: |
            dist/linux-amd64
            dist/web
            dist/build-info.txt
            dist/swarm-${{ steps.version.outputs.version }}-linux-amd64.tar.gz
            dist/container/swarm-container-image.tar
            dist/container/container-image-info.txt
          if-no-files-found: error

      - name: Publish GitHub release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.version.outputs.version }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/swarm-${{ steps.version.outputs.version }}-linux-amd64.tar.gz
            dist/build-info.txt
            dist/container/swarm-container-image.tar
            dist/container/container-image-info.txt
